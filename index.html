<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Tools</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
      padding: 20px;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    p {
      color: #6b7280;
      margin-bottom: 20px;
    }

    .tool {
      display: block;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      text-decoration: none;
      color: #111827;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .tool strong {
      display: block;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .tool span {
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Work Tools</h1>
    <p>Quick access to daily work tools.</p>

    <a class="tool" href="cx.html">
      <strong>CX Interaction Reporter</strong>
      <span>Record customer redirection, demo, and purchase outcomes.</span>
    </a>

    <a class="tool" href="savings.html">
      <strong>Savings Calculator</strong>
      <span>Internal calculation helper.</span>
    </a>

    <a class="tool" href="tracker.html">
      <strong>Sales Tracker</strong>
      <span>Daily sales and interaction tracking.</span>
    </a>
  </div>
</body>
</html>
